<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/32x32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoltHurt</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.0.0/fonts/remixicon.css" rel="stylesheet" />
    <script>
      (function() {
        try {
          var s = JSON.parse(localStorage.getItem("sirhurtSettings") || "{}");
          var hex = (s.accentColor && s.accentColor.startsWith("#")) ? s.accentColor : "#c0392b";
          var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
          var root = document.documentElement;
          root.style.setProperty("--ss-accent",       hex);
          root.style.setProperty("--ss-accent-glow",  "rgba("+r+","+g+","+b+",0.25)");
          root.style.setProperty("--ss-accent-light", "rgba(255,255,255,0.4)");
        } catch(e) {}
      })();
    </script>
    <style>
      html { background: #070709; }

      #static-splash {
        position: fixed; inset: 0; z-index: 10000;
        background: #070709;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 24px;
        transition: opacity 0.5s ease;
      }
      #static-splash.done { opacity: 0; pointer-events: none; }

      #static-splash .ss-logo-wrap {
        position: relative;
        display: flex; align-items: center; justify-content: center;
      }

      #static-splash .ss-glow {
        position: absolute; inset: 0;
        background: var(--ss-accent, #c0392b);
        filter: blur(40px);
        opacity: 0.1;
        animation: ss-pulse 2s cubic-bezier(0.4,0,0.6,1) infinite;
      }

      #static-splash img {
        width: 80px; height: 80px;
        object-fit: contain; position: relative;
        animation: ss-breathe 3s ease-in-out infinite;
      }

      #static-splash .ss-text-group {
        display: flex; flex-direction: column;
        align-items: center; gap: 8px;
      }

      #static-splash .ss-label {
        font-size: 10px; font-weight: 700;
        color: var(--ss-accent-light, rgba(255,255,255,0.4));
        letter-spacing: 0.3em; text-transform: uppercase;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }

      #static-splash .ss-bar {
        width: 96px; height: 1px;
        background: rgba(255,255,255,0.05);
        position: relative; overflow: hidden; border-radius: 9999px;
      }

      #static-splash .ss-bar-fill {
        position: absolute; inset: 0;
        background: linear-gradient(to right, transparent, var(--ss-accent, #c0392b), transparent);
        animation: ss-shimmer 1.5s infinite;
      }

      @keyframes ss-breathe {
        0%,100% { transform: scale(1);    opacity: 0.8; filter: drop-shadow(0 0 0px  var(--ss-accent-glow, rgba(192,57,43,0.25))); }
        50%      { transform: scale(1.05); opacity: 1;   filter: drop-shadow(0 0 20px var(--ss-accent-glow, rgba(192,57,43,0.25))); }
      }
      @keyframes ss-shimmer {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      @keyframes ss-pulse {
        0%,100% { opacity: 0.1; }
        50%      { opacity: 0.2; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="static-splash">
      <div class="ss-logo-wrap">
        <div class="ss-glow"></div>
        <img src="/src/assets/VoltHurt_Logo.png" alt="" draggable="false" />
      </div>
      <div class="ss-text-group">
        <div class="ss-label">VoltHurt</div>
        <div class="ss-bar"><div class="ss-bar-fill"></div></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
